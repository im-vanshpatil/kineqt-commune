<style>
  :root {
    --black: #0a0a09;
    --cream: #f0ebe0;
    --cream-muted: #c8bfaf;
    --gold: #b8a47c;
    --gold-light: #d4c49a;
    --text-muted: #6b6457;
    --surface: #111110;
    --surface2: #181816;
    --border: rgba(240,235,224,0.08);
    --green: #4a7c59;
    --red: #7c4a4a;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--cream);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    cursor: default;
  }

  /* ── LOGIN ── */
  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0;
    background: var(--black);
    position: relative;
  }

  .login-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(184,164,124,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .login-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: var(--cream);
    margin-bottom: 8px;
  }
  .login-logo span { color: var(--gold); }

  .login-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 52px;
  }

  .login-box {
    width: 380px;
    border: 1px solid var(--border);
    padding: 44px 40px;
    background: var(--surface);
  }

  .login-box h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    margin-bottom: 36px;
    letter-spacing: -0.01em;
  }

  .login-field {
    margin-bottom: 24px;
  }

  .login-field label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .login-field input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(240,235,224,0.15);
    padding: 10px 0;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--cream);
    outline: none;
    caret-color: var(--gold);
    transition: border-color 0.25s;
  }

  .login-field input:focus { border-bottom-color: var(--gold); }

  .login-btn {
    width: 100%;
    margin-top: 32px;
    background: var(--cream);
    color: var(--black);
    border: none;
    padding: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.25s;
  }
  .login-btn:hover { background: var(--gold-light); }

  .login-error {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: #c07070;
    letter-spacing: 0.08em;
    margin-top: 16px;
    text-align: center;
    display: none;
  }

  /* ── ADMIN SHELL ── */
  .admin-shell { display: none; min-height: 100vh; }

  .admin-nav {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 48px;
  }

  .admin-nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 0.04em;
  }
  .admin-nav-logo span { color: var(--gold); }
  .admin-nav-logo small {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: block;
    margin-top: 2px;
  }

  .admin-nav-right { display: flex; gap: 16px; align-items: center; }

  .admin-nav-link {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    cursor: pointer;
    background: none;
    border: none;
    transition: color 0.2s;
  }
  .admin-nav-link:hover { color: var(--cream); }

  .admin-nav-link.active { color: var(--cream); }

  .logout-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--black);
    background: var(--cream);
    border: none;
    padding: 9px 20px;
    cursor: pointer;
    transition: background 0.25s;
  }
  .logout-btn:hover { background: var(--gold-light); }

  /* ── MAIN CONTENT ── */
  .admin-main { padding: 52px 48px; max-width: 1200px; margin: 0 auto; }

  .admin-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 48px; }

  .tab-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 14px 28px 14px 0;
    cursor: pointer;
    margin-bottom: -1px;
    transition: color 0.2s, border-color 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tab-btn.active { color: var(--cream); border-bottom-color: var(--gold); }
  .tab-btn:hover { color: var(--cream-muted); }

  .badge {
    background: var(--gold);
    color: var(--black);
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 20px;
    font-weight: 700;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    margin-bottom: 48px;
  }

  .stat-card {
    background: var(--surface);
    padding: 32px 28px;
  }

  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 12px;
  }

  .stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 300;
    color: var(--cream);
    line-height: 1;
  }

  /* ── ADD EVENT FORM ── */
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 300;
    margin-bottom: 32px;
    letter-spacing: -0.01em;
  }
  .section-title em { font-style: italic; color: var(--gold-light); }

  .admin-form {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 40px;
    margin-bottom: 48px;
  }

  .admin-form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 40px;
  }

  .admin-field {
    border-bottom: 1px solid rgba(240,235,224,0.1);
    margin-bottom: 0;
    transition: border-color 0.25s;
  }
  .admin-field:focus-within { border-bottom-color: rgba(184,164,124,0.5); }

  .admin-field label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    padding-top: 16px;
    margin-bottom: 4px;
    opacity: 0.8;
  }

  .admin-field input,
  .admin-field textarea,
  .admin-field select {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 300;
    color: var(--cream);
    padding: 4px 0 16px;
    caret-color: var(--gold);
    letter-spacing: 0.01em;
  }

  .admin-field select option { background: #1a1a18; color: var(--cream); }
  .admin-field input::placeholder,
  .admin-field textarea::placeholder { color: rgba(240,235,224,0.15); }
  .admin-field textarea { resize: none; height: 72px; line-height: 1.5; }

  .admin-field.full { grid-column: span 2; }

  .admin-form-footer {
    display: flex;
    justify-content: flex-end;
    gap: 16px;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .btn-admin-primary {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    background: var(--cream);
    color: var(--black);
    border: none;
    padding: 14px 32px;
    cursor: pointer;
    transition: background 0.25s;
  }
  .btn-admin-primary:hover { background: var(--gold-light); }

  .btn-admin-ghost {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 14px 32px;
    cursor: pointer;
    transition: color 0.25s, border-color 0.25s;
  }
  .btn-admin-ghost:hover { color: var(--cream); border-color: rgba(240,235,224,0.3); }

  /* ── EVENT TABLE ── */
  .events-table { width: 100%; border-collapse: collapse; }

  .events-table th {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .events-table td {
    padding: 18px 16px;
    border-bottom: 1px solid rgba(240,235,224,0.04);
    vertical-align: top;
  }

  .events-table tr:hover td { background: rgba(240,235,224,0.02); }

  .td-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 300;
    color: var(--cream);
    max-width: 220px;
  }

  .td-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    line-height: 1.8;
  }

  .td-type {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .td-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  .action-btn {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    border: none;
    padding: 7px 14px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .action-btn:hover { opacity: 0.8; }

  .btn-approve { background: rgba(74,124,89,0.25); color: #7ec99a; border: 1px solid rgba(74,124,89,0.4); }
  .btn-reject  { background: rgba(124,74,74,0.25); color: #c97e7e; border: 1px solid rgba(124,74,74,0.4); }
  .btn-delete  { background: rgba(124,74,74,0.15); color: #c97e7e; border: 1px solid rgba(124,74,74,0.25); }
  .btn-feature { background: rgba(184,164,124,0.15); color: var(--gold); border: 1px solid rgba(184,164,124,0.3); }

  .empty-table {
    text-align: center;
    padding: 64px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    padding: 16px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--cream-muted);
    letter-spacing: 0.06em;
    z-index: 9999;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 768px) {
    .admin-nav { padding: 16px 20px; }
    .admin-main { padding: 32px 20px; }
    .admin-form-grid { grid-template-columns: 1fr; }
    .admin-field.full { grid-column: span 1; }
    .stats-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-logo">kineQt<span>.commune</span></div>
  <div class="login-label">Admin Access</div>
  <div class="login-box">
    <h2>Sign in</h2>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter') doLogin()" />
    </div>
    <button class="login-btn" onclick="doLogin()">Enter Admin Panel</button>
    <div class="login-error" id="loginError">Incorrect password. Try again.</div>
  </div>
</div>

<!-- ADMIN SHELL -->
<div class="admin-shell" id="adminShell">

  <!-- NAV -->
  <nav class="admin-nav">
    <div class="admin-nav-logo">
      kineQt<span>.commune</span>
      <small>Admin Panel</small>
    </div>
    <div class="admin-nav-right">
      <a href="index.html" class="admin-nav-link" target="_blank">View Site →</a>
      <button class="logout-btn" onclick="doLogout()">Log Out</button>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="admin-main">

    <!-- TABS -->
    <div class="admin-tabs">
      <button class="tab-btn active" onclick="switchTab('pending', this)">
        Pending Review <span class="badge" id="pendingBadge">0</span>
      </button>
      <button class="tab-btn" onclick="switchTab('live', this)">
        Live Events <span class="badge" id="liveBadge">0</span>
      </button>
      <button class="tab-btn" onclick="switchTab('add', this)">
        + Add Event
      </button>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Live Events</div>
        <div class="stat-value" id="statLive">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending Review</div>
        <div class="stat-value" id="statPending">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Submissions</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
    </div>

    <!-- PENDING TAB -->
    <div class="tab-panel active" id="tab-pending">
      <h2 class="section-title">Pending <em>Review</em></h2>
      <div id="pendingList"></div>
    </div>

    <!-- LIVE TAB -->
    <div class="tab-panel" id="tab-live">
      <h2 class="section-title">Live <em>Events</em></h2>
      <div id="liveList"></div>
    </div>

    <!-- ADD TAB -->
    <div class="tab-panel" id="tab-add">
      <h2 class="section-title">Add <em>Event</em></h2>
      <div class="admin-form">
        <div class="admin-form-grid">
          <div class="admin-field">
            <label>Event Name</label>
            <input type="text" id="af-name" placeholder="e.g. PuneMUN 2026" />
          </div>
          <div class="admin-field">
            <label>Category / Type</label>
            <select id="af-type">
              <option value="MUN">MUN</option>
              <option value="Hackathon">Hackathon</option>
              <option value="Debate">Debate</option>
              <option value="Cultural">Cultural</option>
              <option value="Workshop">Workshop</option>
              <option value="Summit">Summit</option>
              <option value="Competition">Competition</option>
              <option value="Social">Social</option>
              <option value="Event">Other</option>
            </select>
          </div>
          <div class="admin-field">
            <label>Date</label>
            <input type="text" id="af-date" placeholder="April 19–20, 2026" />
          </div>
          <div class="admin-field">
            <label>Location</label>
            <input type="text" id="af-location" placeholder="Venue, Pune" />
          </div>
          <div class="admin-field">
            <label>Registration Link or Contact</label>
            <input type="text" id="af-contact" placeholder="https://... or phone number" />
          </div>
          <div class="admin-field">
            <label>Organiser</label>
            <input type="text" id="af-organiser" placeholder="Organisation name" />
          </div>
          <div class="admin-field full">
            <label>Description</label>
            <textarea id="af-desc" placeholder="Short description of the event..."></textarea>
          </div>
        </div>
        <div class="admin-form-footer">
          <button class="btn-admin-ghost" onclick="clearAddForm()">Clear</button>
          <button class="btn-admin-primary" onclick="addEventDirectly()">Publish Event</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const API = 'https://script.google.com/macros/s/AKfycbyhANPhp15yAISXslAa0_lO65z0JrQwKo3oTMNgDJC7s9neNcdURtNTI1J3gsCU4t5Cvg/exec';
  const ADMIN_PASSWORD = 'kineqt2026'; // ← Change this

  // ── API ───────────────────────────────────────────
  async function apiPost(data) {
    const form = new FormData();
    form.append('payload', JSON.stringify(data));
    const res = await fetch(API, { method: 'POST', body: form });
    return res.json();
  }
  async function apiGet(type) {
    const res = await fetch(`${API}?type=${type}`, { redirect: 'follow' });
    return res.json();
  }

  // ── AUTH ──────────────────────────────────────────
  function doLogin() {
    const pw = document.getElementById('passwordInput').value;
    if (pw === ADMIN_PASSWORD) {
      sessionStorage.setItem('kq_auth', '1');
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminShell').style.display = 'block';
      renderAll();
    } else {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
    }
  }

  function doLogout() {
    sessionStorage.removeItem('kq_auth');
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminShell').style.display = 'none';
    document.getElementById('passwordInput').value = '';
  }

  if (sessionStorage.getItem('kq_auth') === '1') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminShell').style.display = 'block';
  }

  // ── TABS ──────────────────────────────────────────
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
    renderAll();
  }

  // ── TOAST ─────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ── RENDER ────────────────────────────────────────
  async function renderAll() {
    try {
      const [pendingRes, liveRes] = await Promise.all([apiGet('pending'), apiGet('live')]);
      const pending = pendingRes.data || [];
      const events  = liveRes.data  || [];

      document.getElementById('statLive').textContent    = events.length;
      document.getElementById('statPending').textContent = pending.length;
      document.getElementById('statTotal').textContent   = events.length + pending.length;
      document.getElementById('pendingBadge').textContent = pending.length;
      document.getElementById('liveBadge').textContent   = events.length;

      renderPending(pending);
      renderLive(events);
    } catch(err) {
      showToast('Could not connect to Google Sheets.');
    }
  }

  function renderPending(list) {
    const el = document.getElementById('pendingList');
    if (list.length === 0) {
      el.innerHTML = `<div class="empty-table">No pending submissions.</div>`;
      return;
    }
    el.innerHTML = `
      <table class="events-table">
        <thead>
          <tr>
            <th>Event</th>
            <th>Organiser</th>
            <th>Details</th>
            <th>Description</th>
            <th>Submitted</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${list.map(ev => `
            <tr>
              <td>
                <div class="td-name">${ev.name}</div>
                <div class="td-type">${ev.type || 'Event'}</div>
              </td>
              <td class="td-meta">${ev.organiser || '—'}<br>${ev.contact || ''}</td>
              <td class="td-meta">${ev.date}<br>${ev.location}</td>
              <td class="td-meta" style="max-width:220px;line-height:1.7;">${ev.desc || '—'}</td>
              <td class="td-meta">${ev.submitted || '—'}</td>
              <td>
                <div class="td-actions">
                  <button class="action-btn btn-approve" onclick="approvePending('${ev.id}')">Approve</button>
                  <button class="action-btn btn-reject"  onclick="rejectPending('${ev.id}')">Reject</button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  function renderLive(list) {
    const el = document.getElementById('liveList');
    if (list.length === 0) {
      el.innerHTML = `<div class="empty-table">No live events yet. Add one or approve a submission.</div>`;
      return;
    }
    el.innerHTML = `
      <table class="events-table">
        <thead>
          <tr>
            <th>Event</th>
            <th>Type</th>
            <th>Details</th>
            <th>Contact</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          ${list.map((ev, i) => `
            <tr>
              <td>
                <div class="td-name">${ev.name}</div>
                ${i === 0 ? '<div class="td-type" style="color:var(--gold-light)">★ Featured</div>' : ''}
              </td>
              <td class="td-type">${ev.type || 'Event'}</td>
              <td class="td-meta">${ev.date}<br>${ev.location}</td>
              <td class="td-meta">${ev.contact || '—'}</td>
              <td>
                <div class="td-actions">
                  ${i !== 0 ? `<button class="action-btn btn-feature" onclick="featureEvent('${ev.id}')">Feature</button>` : ''}
                  <button class="action-btn btn-delete" onclick="deleteEvent('${ev.id}')">Remove</button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  // ── ACTIONS ───────────────────────────────────────
  async function approvePending(id) {
    showToast('Approving...');
    await apiPost({ action: 'approve', id });
    showToast('Event is now live.');
    renderAll();
  }

  async function rejectPending(id) {
    await apiPost({ action: 'reject', id });
    showToast('Submission rejected.');
    renderAll();
  }

  async function deleteEvent(id) {
    if (!confirm('Remove this event from the live feed?')) return;
    await apiPost({ action: 'delete', id });
    showToast('Event removed.');
    renderAll();
  }

  async function featureEvent(id) {
    await apiPost({ action: 'feature', id });
    showToast('Event is now featured.');
    renderAll();
  }

  async function addEventDirectly() {
    const name      = document.getElementById('af-name').value.trim();
    const type      = document.getElementById('af-type').value;
    const date      = document.getElementById('af-date').value.trim();
    const location  = document.getElementById('af-location').value.trim();
    const contact   = document.getElementById('af-contact').value.trim();
    const organiser = document.getElementById('af-organiser').value.trim();
    const desc      = document.getElementById('af-desc').value.trim();

    if (!name || !date || !location) { showToast('Name, date and location are required.'); return; }

    const btn = document.querySelector('#tab-add .btn-admin-primary');
    btn.textContent = 'Publishing...';
    btn.style.pointerEvents = 'none';

    await apiPost({ action: 'add', id: Date.now(), name, type, date, location, contact, organiser, desc, submitted: new Date().toLocaleDateString('en-IN') });
    showToast(`"${name}" published.`);
    clearAddForm();
    btn.textContent = 'Publish Event';
    btn.style.pointerEvents = 'auto';
    switchTab('live', document.querySelectorAll('.tab-btn')[1]);
  }

  function clearAddForm() {
    ['af-name','af-date','af-location','af-contact','af-organiser','af-desc'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('af-type').selectedIndex = 0;
  }

  if (sessionStorage.getItem('kq_auth') === '1') renderAll();
</script>
</body>
</html>
